{% extends "base.html" %}

{% block content %}
    <div id="page-content" hidden>
        {% include "content.html" %}
    </div>
    <script id="mkdocs-toc" type="application/json">{{ page.toc | tojson }}</script>

    <script id="mkdocs-page">
        var mkdocs_page_title = {{ page.title|tojson }};
    </script>

    <div id="document-page">
        <div id="page-content">
            {{ page.content }}
        </div>
        <div id="page-toc">
            <ul>
            {% for toc_item in page.toc %}
                <li><a href="{{ toc_item.url }}">{{ toc_item.title }}</a></li>
                {% for toc_item in toc_item.children %}
                    <li><a href="{{ toc_item.url }}">{{ toc_item.title }}</a></li>
                {% endfor %}
            {% endfor %}
            </ul>
        </div>
    </div>

{% endblock %}
